# /etc/vigil/<instance>.conf — read by vigil-check@<instance> and
# vigil-watch@<instance>. Example for an instance named "etc":
#
#   sudo install -Dm600 systemd/example.conf /etc/vigil/etc.conf
#
# These units only ever read the tree and the PUBLIC key, so this file holds
# no secret. Generate the keypair and the baseline once, by hand:
#
#   vigil keygen   -k /etc/vigil/vigil.key -p /etc/vigil/vigil.pub
#   vigil baseline /etc -k /etc/vigil/vigil.key -o /etc/vigil/etc.vgl
#
# Keep vigil.key OFFLINE (e.g. on removable media); the monitors don't need it.

VIGIL_PATH=/etc
VIGIL_PUB=/etc/vigil/vigil.pub
VIGIL_DB=/etc/vigil/etc.vgl
